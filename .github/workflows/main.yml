name: CI/CD Production

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Stagingテスト
    runs-on: ubuntu-latest
    steps:
      - id: ssh
        uses: invi5H/ssh-action@v1
        with:
          SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEV_SSH_PORT }}
          SSH_USER: ${{ secrets.DEV_SSH_USER }}
          SSH_KEY: ${{ secrets.DEV_SSHE_SSH_KEY }}

      - name: Cypressテスト実行
        run: ssh ${{ steps.ssh.outputs.SERVER }} "cd /ci && npx cypress run --browser chrome --spec cypress/e2e/masaya_ozaki.cy.js"

  deploy:
    name: Productionデプロイ
    runs-on: ubuntu-latest
    needs: test
    steps:
      - id: ssh
        uses: invi5H/ssh-action@v1
        with:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}

      - run: ssh ${{ steps.ssh.outputs.SERVER }} bash /app/masaya_ozaki/deploy.sh masaya_ozaki
